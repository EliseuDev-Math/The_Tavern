<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Página não encontrada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --red: #c0392b;
      --orange: #e67e22;
      --ember: #ff6b35;
      --text: #f0ece4;
      --muted: #6b6460;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, #080808 100%);
      z-index: 1;
      pointer-events: none;
    }

    .grain {
      position: fixed;
      inset: -50%;
      width: 200%; height: 200%;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      z-index: 2;
      pointer-events: none;
      animation: grain-shift 0.5s steps(2) infinite;
    }

    @keyframes grain-shift {
      0%  { transform: translate(0, 0); }
      25% { transform: translate(-2%, -1%); }
      50% { transform: translate(1%, 2%); }
      75% { transform: translate(-1%, 1%); }
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--ember);
      opacity: 0;
      transform: translateY(10px);
      animation: fadein .8s ease forwards .2s;
    }

    .number {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 900;
      font-size: clamp(120px, 22vw, 240px);
      line-height: .85;
      background: linear-gradient(160deg, #c0392b 0%, #e67e22 40%, #ff6b35 60%, #c0392b 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: shimmer 4s ease-in-out infinite, fadein .8s ease forwards .4s;
      opacity: 0;
      user-select: none;
      margin-top: 8px;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    .divider {
      width: clamp(40px, 6vw, 72px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--ember), transparent);
      margin: clamp(16px, 2.5vw, 28px) 0;
      opacity: 0;
      animation: fadein .8s ease forwards .6s;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(18px, 3vw, 32px);
      letter-spacing: -.01em;
      color: var(--text);
      text-align: center;
      opacity: 0;
      animation: fadein .8s ease forwards .7s;
    }

    .sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 1.4vw, 15px);
      color: var(--muted);
      letter-spacing: .02em;
      text-align: center;
      margin-top: 12px;
      max-width: 320px;
      line-height: 1.7;
      opacity: 0;
      animation: fadein .8s ease forwards .85s;
    }

    .actions {
      display: flex;
      gap: 16px;
      margin-top: clamp(28px, 4vw, 44px);
      opacity: 0;
      animation: fadein .8s ease forwards 1s;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 2px;
      transition: all .25s ease;
      cursor: pointer;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--red), var(--orange));
      color: #fff;
      border: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(192,57,43,.45);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(240,236,228,.1);
    }
    .btn-ghost:hover {
      border-color: rgba(240,236,228,.3);
      color: var(--text);
      transform: translateY(-2px);
    }

    .flame-bar {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--red) 20%, var(--orange) 50%, var(--ember) 65%, var(--orange) 80%, transparent 100%);
      opacity: .6;
      z-index: 20;
    }

    @keyframes fadein {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="grain"></div>

<div class="scene">
  <span class="eyebrow">The Tavern</span>
  <div class="number">404</div>
  <div class="divider"></div>
  <h1 class="headline">Mesa não encontrada</h1>
  <p class="sub">Esta página sumiu como a última fatia de espetinho. Que tal voltar ao início?</p>
  <div class="actions">
    <a href="/The-Tavern/" class="btn btn-primary">Voltar ao cardápio</a>
    <a href="javascript:history.back()" class="btn btn-ghost">Página anterior</a>
  </div>
</div>

<div class="flame-bar"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const COLORS = ['#c0392b','#e67e22','#ff6b35','#f39c12','#e74c3c'];

class Ember {
  constructor() { this.reset(true); }
  reset(initial) {
    this.x  = Math.random() * W;
    this.y  = initial ? Math.random() * H : H + 6;
    this.r  = Math.random() * 1.8 + .4;
    this.vx = (Math.random() - .5) * .6;
    this.vy = -(Math.random() * 1.2 + .4);
    this.life   = 1;
    this.decay  = Math.random() * .004 + .003;
    this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * .04 + .01;
    this.twinkle = Math.random() > .6;
  }
  update() {
    this.wobble += this.wobbleSpeed;
    this.x += this.vx + Math.sin(this.wobble) * .3;
    this.y += this.vy;
    this.life -= this.decay;
    if (this.life <= 0 || this.y < -10) this.reset(false);
  }
  draw() {
    const alpha = this.twinkle
      ? this.life * (.5 + .5 * Math.sin(Date.now() * .008 + this.wobble))
      : this.life * .85;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = this.color;
    ctx.shadowBlur  = 6;
    ctx.fillStyle   = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const COUNT = Math.min(200, Math.floor(window.innerWidth * window.innerHeight / 5000));
for (let i = 0; i < COUNT; i++) particles.push(new Ember());

let last = 0;
function loop(ts) {
  if (ts - last > 16) {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    last = ts;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
